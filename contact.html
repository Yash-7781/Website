<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Premium Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Modern Experience</h1>
        <p>A multi-page website for college submission</p>
    </header>

    <nav class="tabs-container">
        <a href="index.html" class="tab-link">Home</a>
        <a href="about.html" class="tab-link">About</a>
        <a href="services.html" class="tab-link">Services</a>
        <a href="contact.html" class="tab-link active">Contact</a>
    </nav>

    <main class="content-container">
        <section id="contact" class="tab-content show">
            <h2>Contact Me</h2>
            <p>Feel free to reach out for any inquiries regarding this project.</p>
            <form class="simple-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="4"></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Student Project. All rights reserved.</p>
    </footer>
